Summary: Privacy-first app blocker with breathing exercises and delay-to-open

Description: |
  App blockers ask for Accessibility Service permissions — the most powerful
  permission on Android. Most are closed-source with vague privacy policies.
  Nudge is different.

  Nudge is open source, requests zero internet permissions, and keeps all
  your data on your device. No analytics. No telemetry. No data leaving
  your phone.

  Features:
  * Delay-to-open with breathing exercises
  * Hard blocking
  * Daily time budgets
  * App groups
  * Schedule-based rules
  * In-app Reels/Shorts blocking
  * Grayscale mode
  * Usage statistics

