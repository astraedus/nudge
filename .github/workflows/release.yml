name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Run tests
        run: ./gradlew test

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > nudge-release.keystore

      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<PROPS
          storeFile=../nudge-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=nudge
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          PROPS

      - name: Resolve version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(sed -n 's/.*versionName = "\([0-9][0-9.]*\)".*/\1/p' app/build.gradle.kts | head -1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "nudge-v${VERSION}.apk"

      # AAB (Android App Bundle) is the format Google Play requires for production
      # uploads. Play App Signing re-signs it with the app key Google holds; the
      # keystore above is only the UPLOAD key. APK is kept for direct GitHub
      # downloads + F-Droid.
      - name: Build release AAB (Google Play)
        run: ./gradlew bundleRelease

      - name: Rename AAB
        run: cp app/build/outputs/bundle/release/app-release.aab "nudge-v${VERSION}.aab"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nudge-release-${{ env.VERSION }}
          path: |
            nudge-v*.apk
            nudge-v*.aab
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nudge-v*.apk
            nudge-v*.aab
          fail_on_unmatched_files: false
