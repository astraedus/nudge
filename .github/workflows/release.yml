name: Release

# RELEASE CONVENTION (updated 2026-07-05): push to main -> rolling 'main-latest' dev-build
# prerelease (an installable signed APK per merge to main, tests gated); 'v*' tag -> versioned
# production release; workflow_dispatch -> one-off manual build (run artifact, no release).

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Run tests
        run: ./gradlew test

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > nudge-release.keystore

      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<PROPS
          storeFile=../nudge-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=nudge
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          PROPS

      - name: Resolve version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(sed -n 's/.*versionName = "\([0-9][0-9.]*\)".*/\1/p' app/build.gradle.kts | head -1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "nudge-v${VERSION}.apk"

      # AAB (Android App Bundle) is the format Google Play requires for production
      # uploads. Play App Signing re-signs it with the app key Google holds; the
      # keystore above is only the UPLOAD key. APK is kept for direct GitHub
      # downloads + F-Droid.
      - name: Build release AAB (Google Play)
        run: ./gradlew bundleRelease

      - name: Rename AAB
        run: cp app/build/outputs/bundle/release/app-release.aab "nudge-v${VERSION}.aab"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nudge-release-${{ env.VERSION }}
          path: |
            nudge-v*.apk
            nudge-v*.aab
          if-no-files-found: error
          # The APK/AAB's durable home is the GitHub Release below; the run
          # artifact is a redundant copy, so keep it short-lived.
          retention-days: 3

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nudge-v*.apk
            nudge-v*.aab
          fail_on_unmatched_files: false

      # --- main push: publish/refresh a rolling "latest main" PRERELEASE carrying the
      #     signed APK, so every merge to main yields an installable dev build at a stable
      #     URL (…/releases/tag/main-latest). NOT a versioned release — the gradle version
      #     isn't bumped between releases; this is the bleeding-edge build for testers
      #     (already tests-gated by the `./gradlew test` step above). Real installs use a
      #     v* release / Play. The rolling tag is deleted+recreated so it always points at
      #     the newest main. ---
      - name: Publish rolling dev build (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="main-latest"
          # Rename to a STABLE filename so the download URL never changes
          # (…/main-latest/nudge-main.apk) — the `#label` gh syntax only sets a
          # display label, leaving the asset filename versioned, so copy instead.
          cp "nudge-v${VERSION}.apk" nudge-main.apk

          # The GitHub REST API intermittently returns transient 5xx/timeout
          # errors (e.g. "error checking for existing release: HTTP 503"), which
          # previously failed the ENTIRE Release run even though build + tests +
          # artifact upload all succeeded (run 29710052363, 2026-07-20). Publish
          # the rolling tag as an idempotent delete-then-create unit and retry it
          # with exponential backoff so a momentary API blip on this convenience
          # step can't sink the pipeline. A persistent failure still fails loudly.
          publish_rolling_build() {
            # delete is best-effort: a missing tag (first run) or a transient
            # error is fine — the retried create is what must ultimately succeed,
            # and any stale release left by a failed delete is cleared by the
            # delete at the start of the next attempt before create re-runs.
            gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
            gh release create "$TAG" nudge-main.apk \
              --title "Nudge — latest main (dev build)" \
              --target "$GITHUB_SHA" \
              --prerelease \
              --notes "Automated development build from the latest \`main\` (commit ${GITHUB_SHA::7}, v${VERSION}). Installable signed APK reflecting current main — NOT a versioned release. For stable installs use a \`v*\` release / the Play Store."
          }

          attempt=1
          max_attempts=5
          delay=10
          until publish_rolling_build; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Rolling dev build publish failed after $max_attempts attempts"
              exit 1
            fi
            echo "Publish attempt $attempt/$max_attempts failed (likely a transient GitHub API error); retrying in ${delay}s..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
